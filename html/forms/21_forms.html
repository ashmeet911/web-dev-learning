<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form>
        <label for="Name">Name: </label>
        <input type="text" name="userName" id="Name">
        <br/><br/>
        
        <label for="FatherName">Father's Name: </label>
        <input type="text" name="userFatherName" id="FatherName">
        <br/><br/>

        <label for="Age">Age: </label>
        <input type="number" name="userAge" id="Age">
        <br/><br/>

        <label for="Password">Password: </label>
        <input type="password" name="userPassword" id="Password">
        <br/><br/>

        <label for="male">Male</label>
        <input type="radio" name="gender" id="male" value="male">
        
        <label for="female">Female</label>
        <input type="radio" name="gender" id="female" value="female">
        
        <label for="other">Other</label>
        <input type="radio" name="gender" id="other" value="other">
        <br/><br/> 

        <label for="c++">C++</label>
        <input type="checkbox" name="Subject" id="c++" value="C++">

        <label for="EEE">EEE</label>
        <input type="checkbox" name="Subject" id="EEE" value="EEE">

        <label for="Automata theory">Automata theory</label>
        <input type="checkbox" name="Subject" id="Automata theory" value="Automata theory">

        <label for="Stats">Statistics</label>
        <input type="checkbox" name="Subject" id="Stats" value="Statistics">

        <input type="submit">
    </form>
</body>     
</html>
