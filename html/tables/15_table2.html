<table border="1">
    <thead><!--This will the header part-->
    <tr> 
        <th>Item</th>
        <th>Quantity</th>
        <th>Price</th>
    </tr></thead>

    <tbody>
        <tr><!--These two will the body part-->
            <td>Apple</td>
            <td>10</td>
            <td>$1.00</td>
        </tr>

    <tr>
        <td>Orange</td>
        <td>5</td>
        <td>$1.50</td>
    </tr>
</tbody>

    <tfoot><!--gives conclusion to the table-->
    <tr> <!--This will the footer part-->
        <td>Total</td>
        <td>15</td>
        <td>$2.50</td>
    </tr></tfoot>
</table>
