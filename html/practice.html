<form>
    <label for="name"> Name: </label>
    <input type="text" id="name" name="name" placeholder="e.g. Rahul">
    <br>
    <br>

    <label for="fname">Father's Name:</label>
    <input type="text" id="fname" name="fname" placeholder="e.g. John">

    <br>
    <br>
    <label for="age">Age:</label>
    <input type="number" name="age" id="age" >

    <br>
    <br>
    <label >Password:</label>
    <input type="password" name="password">

    <br>
    <br>
    <label for="male">Male</label>
    <input type="radio" name="userGender" id="male" value="male">
    <label for="female">Female</label>
    <input type="radio" name="userGender" id="female" value="female">
    <label for="other">Other</label>
    <input type="radio" name="userGender" id="other" value="other">
    <br>
    <br>
    <label for="C++">C++</label>
    <input type="checkbox" name="languages" id="C++" value="C++">

    <input type="checkbox" name="languages" id="Python" value="Python">
    <label for="Java">Java</label>
    <input type="checkbox" name="languages" id="Java" value="Java"> 
    <br>
    <br>
    <input type="submit">
</form>
